spring:
  datasource:
    url: jdbc:mysql://mysql:3306/ticketing?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: password

  data:
