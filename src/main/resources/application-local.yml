spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ticketing?useUnicode=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password:

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

          naver:
            client-id: UueWfxV1wugFZq_GgIGT
            client-secret: BvXkbeg8v8
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  cloud:
    aws:
      sqs:
        enabled: true
        endpoint: http://localhost:4566
      region:
        static: ap-northeast-2
      s3:
        endpoint: http://localhost:4566
        path-style-access-enabled: true
      credentials:
        access-key: test-access-key
        secret-key: test-secret-key

app:
  seat:
    hold-ttl-seconds: 10

jwt:
  secret: ${JWT_SECRET:local-test-secret-key-local-test-secret-key-1234567890}