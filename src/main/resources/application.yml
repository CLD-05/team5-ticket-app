spring:
  datasource:
    url: jdbc:mysql://localhost:3307/ticketing?useUnicode=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    aws:
      sqs:
        enabled: false
      region:
        static: ap-northeast-2

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

app:
  dummy-data:
    reset-enabled: ${DUMMY_DATA_RESET_ENABLED:false}
  sqs:
    booking-queue: ${AWS_SQS_BOOKING_QUEUE_URL:booking-queue}
  s3:
    bucket: ${AWS_S3_POSTER_BUCKET:team5-dev-poster-bucket}
  admin:
    token: ${ADMIN_TOKEN:admin}

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info
