<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seat Selection Platform</title>
    <style>
        body {
            font-family: 'Dotum', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
    		box-sizing: border-box;
            user-select: none;
        }
        .window-wrapper {
            width: 1050px;
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 2px solid #333333;
            height: 25px;
        }
        .title-area {
            font-size: 16px;
            font-weight: bold;
            color: #333333;
        }
        .title-area span {
            color: #666666;
            font-weight: normal;
            margin-left: 10px;
        }
        .main-body {
            display: flex;
            height: 610px;
        }
        .map-area {
            width: 780px;
            background-color: #f9f9f9;
            padding: 25px 20px 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            border-right: 1px solid #e5e5e5;
            box-sizing: border-box;
        }
        .stage-line {
            width: 400px;
            height: 25px;
            background-color: #ffffff;
            border: 1px solid #dddddd;
            color: #999999;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
            letter-spacing: 5px;
            text-indent: 5px;
        }
        .floor-section {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 35px;
            position: relative;
            box-sizing: border-box;
        }
        .floor-badge {
            position: absolute;
            left: 15px;
            width: 32px;
            height: 32px;
            background-color: #444444;
            color: #ffffff;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 5;
        }
        .blocks-container {
            display: flex;
            justify-content: center;
            width: 100%;
            gap: 35px;
            padding: 0;
            box-sizing: border-box;
        }
        .block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .block-label {
            font-size: 12px;
            font-weight: bold;
            color: #666666;
            margin-bottom: 10px;
        }
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(8, 20px);
            gap: 3px;
        }
        .seat {
            width: 20px;
            height: 20px;
            border: 1px solid #ffffff;
            cursor: pointer;
            box-sizing: border-box;
            transition: transform 0.1s ease;
        }
        .seat:hover {
            transform: scale(1.15);
            z-index: 10;
        }
        .AVAILABLE-VIP { background-color: #f5a623; }
        .AVAILABLE-SR  { background-color: #ff7043; }
        .AVAILABLE-R   { background-color: #8a2be2; }
        .AVAILABLE-S   { background-color: #00cd3c; }
        .HOLD { background-color: #999999; }
        /* 내가 지금 선택한 좌석 (낙관적 업데이트 즉시 반영용) — 배경색 없이 테두리+확대로만 구분 */
        .SELECTED {
            box-shadow: 0 0 0 3px #1f2937;
            transform: scale(1.08);
            z-index: 1;
        }
        .SOLD {
            background-color: #e9ecef;
            cursor: not-allowed;
            border: 1px solid #dee2e6;
        }
        .SOLD:hover {
            transform: none;
        }
        .console-line {
            width: 200px;
            height: 25px;
            background-color: #ffffff;
            border: 1px solid #dddddd;
            color: #999999;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
            letter-spacing: 3px;
            text-indent: 3px;
        }
        .sidebar {
            width: 270px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .sidebar-top {
            padding: 20px;
        }
        #timer-box {
            font-size: 24px;
            font-weight: bold;
            color: #666666;
            text-align: center;
            background-color: #f8f9fa;
            border: 1px solid #eeeeee;
            padding: 10px;
            margin-bottom: 25px;
            margin-top: 15px;
        }
        .legend-title {
            font-size: 13px;
            font-weight: bold;
            color: #333333;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-refresh {
            background-color: #f8f9fa;
            border: 1px solid #dddddd;
            padding: 3px 8px;
            font-size: 10px;
            font-weight: bold;
            color: #555555;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }
        .btn-refresh:hover {
            background-color: #222222;
            color: #ffffff;
            border-color: #222222;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 12px;
            color: #333333;
        }
        .legend-box {
            width: 16px;
            height: 16px;
            margin-right: 10px;
        }
        .legend-price {
            margin-left: auto;
            color: #666666;
        }
        .btn-complete {
            width: 100%;
            height: 60px;
            background-color: #555555;
            color: #ffffff;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-complete:hover {
            background-color: #333333;
        }
        .bottom-status {
            background-color: #444444;
            color: #ffffff;
            padding: 15px 20px;
            font-size: 14px;
            font-weight: bold;
            height: 18px;
        }
    </style>
</head>
<body>

    <div class="window-wrapper">
        <div class="top-header">
            <div class="title-area">좌석 선택 <span th:text="${showTitle}">공연 제목 대기 중</span></div>
        </div>

        <div class="main-body">
            <div class="map-area">
                <div class="stage-line">STAGE</div>
                
                <div class="floor-section">
                    <div class="floor-badge">1F</div>
                    <div class="blocks-container">
                        <div class="block">
                            <div class="block-label">A</div>
                            <div class="seats-grid" id="grid-1-A"></div>
                        </div>
                        <div class="block">
                            <div class="block-label">B</div>
                            <div class="seats-grid" id="grid-1-B"></div>
                        </div>
                        <div class="block">
                            <div class="block-label">C</div>
                            <div class="seats-grid" id="grid-1-C"></div>
                        </div>
                    </div>
                </div>

                <div class="floor-section">
                    <div class="floor-badge">2F</div>
                    <div class="blocks-container">
                        <div class="block">
                            <div class="block-label">A</div>
                            <div class="seats-grid" id="grid-2-A"></div>
                        </div>
                        <div class="block">
                            <div class="block-label">B</div>
                            <div class="seats-grid" id="grid-2-B"></div>
                        </div>
                        <div class="block">
                            <div class="block-label">C</div>
                            <div class="seats-grid" id="grid-2-C"></div>
                        </div>
                    </div>
                </div>

                <div class="console-line">CONSOLE</div>
            </div>

            <div class="sidebar">
                <div class="sidebar-top">
                    <div id="timer-box"><span id="timer">05:00</span></div>
                    <div class="legend-title">
                        <span>좌석등급/잔여석</span>
                        <button class="btn-refresh" onclick="refreshAndReleaseSeat()">새로고침</button>
                    </div>
                    <div id="legend-list"></div>
                </div>
                <button class="btn-complete" onclick="clickComplete()">좌석 선택 완료</button>
            </div>
        </div>

        <div class="bottom-status" id="status-bar">좌석을 선택해 주세요.</div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const performanceId = /*[[${performanceId}]]*/ 1;

        let countdownInterval = null;
        let currentSelectedSeatId = null;
        let isHolding = false;   // 선점 처리 중이면 폴링이 화면을 덮어쓰지 않도록 가드

        function getAccessToken() {
            return localStorage.getItem("accessToken");
        }

        function authHeaders() {
            const token = getAccessToken();
            return {
                "Content-Type": "application/json",
                "Authorization": token ? `Bearer ${token}` : ""
            };
        }

        // 좌석번호 형식: {등급}-{구역}-{번호}  예) V-A-1, R-B-15, S-C-40
        // 구역 정보가 없는 옛 형식(V-1)도 호환: 구역 기본값 'A'
        function parseSeat(seatNumber) {
            const parts = (seatNumber || '').split('-');
            const prefix = (parts[0] || '').toUpperCase();
            // 가운데 토큰이 구역(A/B/C)이면 사용, 아니면 'A'
            const zone = (parts.length >= 3 && /^[ABC]$/.test(parts[1].toUpperCase()))
                ? parts[1].toUpperCase() : 'A';
            const map = {
                'V':  { name: 'VIP', cls: 'VIP', floor: 1, order: 1 },
                'VIP':{ name: 'VIP', cls: 'VIP', floor: 1, order: 1 },
                'SR': { name: 'SR',  cls: 'SR',  floor: 2, order: 2 },
                'R':  { name: 'R',   cls: 'R',   floor: 2, order: 3 },
                'S':  { name: 'S',   cls: 'S',   floor: 2, order: 4 },
            };
            const g = map[prefix] || { name: prefix, cls: 'S', floor: 2, order: 99 };
            return { ...g, zone };
        }

        async function fetchSeats() {
            // 선점 처리 중에는 폴링 갱신 스킵 (클릭 씹힘 방지)
            if (isHolding) return;
            try {
                const response = await fetch(`/api/v1/performances/${performanceId}/seats`, {
                    headers: authHeaders()
                });
                if (!response.ok) {
                    if (response.status === 400 || response.status === 401) {
                        const errData = await response.json().catch(() => ({}));
                        alert(errData.message || "대기열 인증이 만료되었거나 유효하지 않습니다. 대기열로 이동합니다.");
                        window.location.href = `/shows/${performanceId}/queue`;
                    }
                    return;
                }
                const seats = await response.json();
                renderSeats(seats);
            } catch (error) {
                console.error(error);
            }
        }

        function renderSeats(seats) {
            // 모든 그리드 비우기
            ['A','B','C'].forEach(b => {
                const g1 = document.getElementById(`grid-1-${b}`);
                const g2 = document.getElementById(`grid-2-${b}`);
                if (g1) g1.innerHTML = '';
                if (g2) g2.innerHTML = '';
            });

            // 구역(A/B/C) → 층(VIP=1F, R/S=2F) → 등급순(VIP→SR→R→S) → 좌석ID 순으로 정렬
            // 같은 그리드 안에서 SR→R→S 순으로 위에서부터 쌓이도록
            seats.sort((a, b) => {
                const ga = parseSeat(a.seatNumber), gb = parseSeat(b.seatNumber);
                if (ga.zone !== gb.zone) return ga.zone < gb.zone ? -1 : 1;
                if (ga.order !== gb.order) return ga.order - gb.order;
                return a.seatId - b.seatId;
            });

            seats.forEach(seat => {
                const g = parseSeat(seat.seatNumber);
                // 등급으로 층 결정(VIP=1F, 나머지=2F), 좌석번호의 구역으로 A/B/C 결정
                const targetGrid = document.getElementById(`grid-${g.floor}-${g.zone}`);
                if (!targetGrid) return;

                const div = document.createElement('div');
                // 좌석 칸을 ID로 직접 찾아 부분 갱신할 수 있도록 데이터 속성 부여
                div.dataset.seatId = seat.seatId;
                div.dataset.seatNumber = seat.seatNumber;
                div.dataset.cls = g.cls;

                // ── 새로고침 시 내가 선점한 좌석 정보 복구 ──
                if (seat.isMyHold && currentSelectedSeatId === null) {
                    currentSelectedSeatId = seat.seatId;
                    document.getElementById('status-bar').textContent = `선택한 좌석: ${seat.seatNumber}`;
                    startTimer();
                }

                // 내가 지금 선택 중인 좌석이면 등급 색 유지 + 테두리로 표시
                if (seat.seatId === currentSelectedSeatId) {
                    div.className = `seat AVAILABLE-${g.cls} SELECTED`;
                } else if (seat.status === 'AVAILABLE') {
                    div.className = `seat AVAILABLE-${g.cls}`;
                } else {
                    div.className = `seat ${seat.status}`;
                }
                div.title = `${seat.seatNumber} [${g.name}석/${g.zone}구역] - ${seat.status}`;

                div.onclick = () => {
                    if (seat.status === 'AVAILABLE' || seat.status === 'HOLD'
                        || seat.seatId === currentSelectedSeatId) {
                        requestSeatHold(seat.seatId, seat.seatNumber);
                    }
                };
                targetGrid.appendChild(div);
            });

            renderLegend(seats);
        }

        // 좌석 데이터에서 등급별 가격/잔여석 집계 → 범례 동적 생성
        function renderLegend(seats) {
            const legendList = document.getElementById('legend-list');
            if (!legendList) return;

            const agg = {};  // 등급명 → { cls, price, remaining }
            seats.forEach(seat => {
                const g = parseSeat(seat.seatNumber);
                if (!agg[g.name]) {
                    agg[g.name] = { cls: g.cls, price: seat.price, remaining: 0, order: g.order };
                }
                if (seat.status === 'AVAILABLE') agg[g.name].remaining++;
            });

            const rows = Object.entries(agg)
                .sort((a, b) => a[1].order - b[1].order)
                .map(([name, info]) => {
                    const price = info.price.toLocaleString('ko-KR');
                    return `
                        <div class="legend-item">
                            <div class="legend-box AVAILABLE-${info.cls}"></div>
                            <div>${name}석 <span style="color:#999;font-size:11px;">(잔여 ${info.remaining})</span></div>
                            <div class="legend-price">${price}원</div>
                        </div>`;
                }).join('');
            legendList.innerHTML = rows;
        }

        // 좌석 칸 하나만 즉시 다시 칠한다 (전체 재조회 없이 부분 갱신)
        //   visual: 'SELECTED' | 'AVAILABLE' | 'HOLD' | 'SOLD'
        function paintSeat(seatId, visual) {
            const div = document.querySelector(`.seat[data-seat-id="${seatId}"]`);
            if (!div) return;
            const cls = div.dataset.cls || 'S';
            if (visual === 'SELECTED') {
                // 등급 색을 유지한 채 테두리(SELECTED)만 얹는다
                div.className = `seat AVAILABLE-${cls} SELECTED`;
            } else if (visual === 'AVAILABLE') {
                div.className = `seat AVAILABLE-${cls}`;
            } else {
                div.className = `seat ${visual}`;
            }
        }

        async function requestSeatHold(seatId, seatNumber) {
            const previousSeatId = currentSelectedSeatId;

            // ── 같은 좌석 재클릭 = 선택 취소 ──
            if (previousSeatId === seatId) {
                // 낙관적: 화면 즉시 해제
                paintSeat(seatId, 'AVAILABLE');
                currentSelectedSeatId = null;
                if (countdownInterval) clearInterval(countdownInterval);
                document.getElementById('timer').textContent = "05:00";
                document.getElementById('status-bar').textContent = "좌석 선택이 취소되었습니다.";
                // 서버 해제는 백그라운드 (결과 안 기다림)
                fetch(`/api/v1/seats/${seatId}/hold`, { method: 'DELETE', headers: authHeaders() })
                    .catch(e => console.error(e));
                return;
            }

            // ── 새 좌석 선택 (또는 다른 좌석으로 변경) ──
            // 1) 낙관적 화면 반영: 클릭 즉시 색/상태바/타이머 갱신 (네트워크 대기 X)
            if (previousSeatId !== null) paintSeat(previousSeatId, 'AVAILABLE');
            paintSeat(seatId, 'SELECTED');
            currentSelectedSeatId = seatId;
            document.getElementById('status-bar').textContent = `선택한 좌석: ${seatNumber}`;
            startTimer();

            // 2) 서버 선점은 백그라운드. 옛 좌석 해제는 새 좌석 확정 후에 (실패 시 롤백 위해 미리 안 풂)
            isHolding = true;  // 폴링이 깜빡임 유발하지 않도록 가드
            try {
                const res = await fetch(`/api/v1/seats/${seatId}/hold`, {
                    method: 'POST', headers: authHeaders()
                });

                if (res.status === 409 || !res.ok) {
                    // 롤백: 방금 칠한 새 좌석 되돌리고, 이전 선택이 있었으면 복원
                    paintSeat(seatId, 'AVAILABLE');
                    if (res.status === 409) alert('이미 다른 사용자가 선택 중인 좌석입니다.');
                    if (previousSeatId !== null) {
                        paintSeat(previousSeatId, 'SELECTED');
                        currentSelectedSeatId = previousSeatId;
                        document.getElementById('status-bar').textContent = `선택한 좌석 유지 중`;
                    } else {
                        currentSelectedSeatId = null;
                        if (countdownInterval) clearInterval(countdownInterval);
                        document.getElementById('timer').textContent = "05:00";
                        document.getElementById('status-bar').textContent = "좌석을 선택해 주세요.";
                    }
                    return;
                }

                // 새 좌석 확정 성공 → 이제 옛 좌석 서버 해제 (백그라운드)
                if (previousSeatId !== null) {
                    fetch(`/api/v1/seats/${previousSeatId}/hold`, { method: 'DELETE', headers: authHeaders() })
                        .catch(e => console.error(e));
                }
            } catch (e) {
                console.error(e);
                // 네트워크 오류 → 낙관적 상태 롤백
                paintSeat(seatId, 'AVAILABLE');
                currentSelectedSeatId = previousSeatId;
                if (previousSeatId !== null) paintSeat(previousSeatId, 'SELECTED');
            } finally {
                isHolding = false;
                // 전체 재조회로 화면을 막지 않는다(여기서 fetchSeats 호출 안 함).
                // 잔여석/타인 변경 반영은 2초 주기 폴링이 알아서 동기화.
            }
        }

        async function clickComplete() {
            if (!currentSelectedSeatId) {
                alert("좌석을 먼저 선택해 주세요.");
                return;
            }
            try {
                const response = await fetch(`/api/v1/bookings?seatId=${currentSelectedSeatId}`, {
                    method: 'POST', headers: authHeaders()
                });
                if (response.status === 202) {
                    const data = await response.json();
                    document.getElementById('status-bar').textContent = "결제 요청이 접수되었습니다. 대기 페이지로 이동합니다...";
                    setTimeout(() => {
                        window.location.href = `/booking/process?requestId=${data.requestId}`;
                    }, 1000);
                } else {
                    const errData = await response.json();
                    alert(errData.message || "예매 요청에 실패했습니다.");
                }
            } catch (error) {
                console.error(error);
                alert("서버 연결에 실패했습니다.");
            }
        }

        function startTimer() {
            if (countdownInterval) clearInterval(countdownInterval);
            let timeRemaining = 300;
            const timerElement = document.getElementById('timer');
            countdownInterval = setInterval(() => {
                timeRemaining--;
                if (timeRemaining <= 0) {
                    clearInterval(countdownInterval);
                    timerElement.textContent = "05:00";
                    document.getElementById('status-bar').textContent = "좌석을 선택해 주세요.";
                    alert("제한 시간이 만료되어 선택이 취소되었습니다.");
                    currentSelectedSeatId = null;
                    fetchSeats();
                    return;
                }
                const minutes = String(Math.floor(timeRemaining / 60)).padStart(2, '0');
                const seconds = String(timeRemaining % 60).padStart(2, '0');
                timerElement.textContent = `${minutes}:${seconds}`;
            }, 1000);
        }

        fetchSeats();
        setInterval(fetchSeats, 2000);
        
        async function refreshAndReleaseSeat() {
            if (currentSelectedSeatId !== null) {
                const seatIdToRelease = currentSelectedSeatId;
                currentSelectedSeatId = null;

                if (countdownInterval) clearInterval(countdownInterval);
                document.getElementById('timer').textContent = "05:00";
                document.getElementById('status-bar').textContent = "좌석을 선택해 주세요.";

                try {
                    await fetch(`/api/v1/seats/${seatIdToRelease}/hold`, {
                        method: 'DELETE',
                        headers: authHeaders()
                    });
                } catch (e) {
                    console.error(e);
                }
            }

            fetchSeats();
        }
        /*]]>*/
    </script>

</body>
</html>
