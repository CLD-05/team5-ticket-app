<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예매 완료 - Ticket Wave</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f7f8fc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #222;
        }
        .container {
            text-align: center;
            background: #ffffff;
            padding: 48px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 480px;
            width: 90%;
        }
        .check-circle {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 38px;
            font-weight: 900;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #111827;
        }
        p {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            min-width: 150px;
            height: 50px;
            border: 0;
            border-radius: 10px;
            padding: 0 22px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-primary {
            background: #4f46e5;
            color: #ffffff;
        }
        .btn-primary:hover {
            background: #4338ca;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="check-circle">&#10003;</div>
        <h2>예매가 완료되었습니다</h2>
        <p>
            예매해 주셔서 감사합니다.<br>
            예매 내역은 마이페이지에서 확인할 수 있습니다.
        </p>
        <div class="actions">
            <a class="btn btn-secondary" href="/">홈으로 이동</a>
            <a class="btn btn-primary" href="/mypage">마이페이지로 이동</a>
        </div>
    </div>
</body>
</html>
