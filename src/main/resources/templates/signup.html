<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - QueueTicket</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="auth-logo">QueueTicket</a>
        <div class="auth-subtitle">회원가입하고 간편하게 예매를 시작하세요.</div>
      </div>

      <div class="alert alert-danger" id="errorAlert"></div>
      <div class="alert alert-success" id="successAlert"></div>

      <form id="signupForm">
        <div class="form-group">
          <label class="form-label" for="name">이름</label>
          <input class="form-input" type="text" id="name" required placeholder="홍길동">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">이메일 주소</label>
          <input class="form-input" type="email" id="email" required placeholder="example@email.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input class="form-input" type="password" id="password" required placeholder="4자 이상 20자 이하" minlength="4" maxlength="20">
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">비밀번호 확인</label>
          <input class="form-input" type="password" id="confirmPassword" required placeholder="비밀번호 다시 입력">
        </div>

        <button class="auth-btn" type="submit">회원가입</button>
      </form>

      <div class="auth-footer">
        이미 회원이신가요? <a class="auth-link" href="/login">로그인</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async function(event) {
        event.preventDefault();
        
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        
        const errorAlert = document.getElementById("errorAlert");
        const successAlert = document.getElementById("successAlert");
        
        errorAlert.style.display = "none";
        successAlert.style.display = "none";
        
        if (password !== confirmPassword) {
            errorAlert.textContent = "비밀번호가 일치하지 않습니다.";
            errorAlert.style.display = "block";
            return;
        }
        
        try {
            const response = await fetch("/api/v1/auth/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name, email, password })
            });
            
            if (response.ok) {
                successAlert.textContent = "회원가입이 완료되었습니다! 잠시 후 로그인 페이지로 이동합니다.";
                successAlert.style.display = "block";
                
                setTimeout(() => {
                    window.location.href = "/login";
                }, 1500);
            } else {
                const errData = await response.json();
                errorAlert.textContent = errData.message || "회원가입에 실패했습니다.";
                errorAlert.style.display = "block";
            }
        } catch (error) {
            errorAlert.textContent = "서버 연결에 실패했습니다. 나중에 다시 시도해주세요.";
            errorAlert.style.display = "block";
        }
    });
  </script>
</body>
</html>
