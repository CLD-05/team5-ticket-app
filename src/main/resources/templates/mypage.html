<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - Ticket Wave</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">Ticket Wave</a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link">공연 예매</a>
      <button class="navbar-btn navbar-btn-outline" id="logoutBtn">로그아웃</button>
    </div>
  </nav>

  <div class="mypage-container">
    <div class="mypage-card">
      <h2 class="mypage-title">마이페이지</h2>
      
      <div class="alert alert-danger" id="errorAlert"></div>

      <div class="user-info-section" id="userInfo" style="display:none;">
        <div class="info-label" style="align-self: center;">사용자 ID</div>
        <div class="info-value" id="userIdVal" style="align-self: center; font-family: monospace;"></div>

        <div class="info-label" style="align-self: center;">이메일 계정</div>
        <div class="info-value" id="emailVal" style="align-self: center;"></div>

        <div class="info-label" style="align-self: center;">이름</div>
        <div class="info-value-edit" style="display: flex; align-items: center;">
          <input type="text" id="nameInput" class="form-input" style="width: 200px; display: inline-block; padding: 8px 12px; font-size: 14px; margin-right: 8px;">
          <button class="navbar-btn navbar-btn-outline" style="padding: 8px 12px; font-size: 13px;" onclick="updateName()">수정</button>
        </div>
      </div>

      <h3 class="mypage-subtitle" style="margin-top: 40px; margin-bottom: 20px; font-size: 20px; font-weight: 600; border-bottom: 1.5px solid var(--border-color); padding-bottom: 8px;">나의 예매 내역</h3>
      <div id="bookingListSection">
          <div id="noBookings" style="display: none; color: var(--text-secondary); text-align: center; padding: 30px 0;">예매 내역이 존재하지 않습니다.</div>
          <table id="bookingTable" style="display: none; width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; text-align: left;">
              <thead>
                  <tr style="border-bottom: 1.5px solid var(--border-color); font-weight: 600; color: var(--text-secondary);">
                      <th style="padding: 12px 8px;">예약번호</th>
                      <th style="padding: 12px 8px;">공연명</th>
                      <th style="padding: 12px 8px;">장소</th>
                      <th style="padding: 12px 8px;">좌석번호</th>
                      <th style="padding: 12px 8px;">가격</th>
                      <th style="padding: 12px 8px;">예매일시</th>
                      <th style="padding: 12px 8px;">관리</th>
                  </tr>
              </thead>
              <tbody id="bookingTableBody">
              </tbody>
          </table>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("accessToken");
    if (!token) {
        window.location.href = "/login";
    }

    document.addEventListener("DOMContentLoaded", async () => {
        const errorAlert = document.getElementById("errorAlert");
        const userInfo = document.getElementById("userInfo");
        
        try {
            const userResponse = await fetch("/api/v1/users/me", {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });
            
            if (userResponse.ok) {
                const data = await userResponse.json();
                document.getElementById("userIdVal").textContent = data.userId;
                document.getElementById("emailVal").textContent = data.email;
                document.getElementById("nameInput").value = data.name;
                userInfo.style.display = "grid";
            } else {
                localStorage.clear();
                window.location.href = "/login";
                return;
            }

            const bookingsResponse = await fetch("/api/v1/bookings/me", {
                method: "GET",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            if (bookingsResponse.ok) {
                const bookings = await bookingsResponse.json();
                renderBookings(bookings);
            }
        } catch (error) {
            errorAlert.textContent = "정보를 불러오는 데 실패했습니다. 서버 상태를 확인해주세요.";
            errorAlert.style.display = "block";
        }
    });

    function renderBookings(bookings) {
        const noBookings = document.getElementById("noBookings");
        const bookingTable = document.getElementById("bookingTable");
        const bookingTableBody = document.getElementById("bookingTableBody");

        bookingTableBody.innerHTML = "";

        if (!bookings || bookings.length === 0) {
            noBookings.style.display = "block";
            bookingTable.style.display = "none";
            return;
        }

        bookings.forEach(b => {
            const row = document.createElement("tr");
            row.style.borderBottom = "1px solid var(--border-color)";
            
            const bookedDate = new Date(b.bookedAt);
            const formattedDate = bookedDate.toLocaleDateString('ko-KR', {
                year: 'numeric', month: '2-digit', day: '2-digit'
            }) + ' ' + bookedDate.toLocaleTimeString('ko-KR', {
                hour: '2-digit', minute: '2-digit'
            });

            row.innerHTML = `
                <td style="padding: 12px 8px; font-family: monospace; font-size: 12px; color: var(--text-secondary);">${b.bookingId.substring(0, 8)}...</td>
                <td style="padding: 12px 8px; font-weight: 500; color: var(--text-primary);">${b.showTitle}</td>
                <td style="padding: 12px 8px; color: var(--text-secondary);">${b.venue}</td>
                <td style="padding: 12px 8px;"><span style="background-color: #eff6ff; color: #2563eb; padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 12px;">${b.seatNumber}</span></td>
                <td style="padding: 12px 8px; font-weight: 600; color: var(--text-primary);">${b.price.toLocaleString()}원</td>
                <td style="padding: 12px 8px; color: var(--text-secondary); font-size: 13px;">${formattedDate}</td>
                <td style="padding: 12px 8px;">
                    <button onclick="cancelBooking('${b.bookingId}')"
                        style="background:#fee2e2; color:#ef4444; border:1px solid #fecaca; padding:6px 12px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer;">
                        예매 취소
                    </button>
                </td>
            `;
            bookingTableBody.appendChild(row);
        });

        noBookings.style.display = "none";
        bookingTable.style.display = "table";
    }

    async function cancelBooking(bookingId) {
        if (!confirm("정말 예매를 취소하시겠습니까?")) return;

        try {
            const response = await fetch(`/api/v1/bookings/${bookingId}`, {
                method: "DELETE",
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            if (response.ok) {
                alert("예매가 취소되었습니다.");
                location.reload();
            } else {
                const errData = await response.json().catch(() => ({}));
                alert(errData.message || "예매 취소에 실패했습니다.");
            }
        } catch (error) {
            alert("서버 연결에 실패했습니다.");
        }
    }

    async function updateName() {
        const newName = document.getElementById("nameInput").value;
        const errorAlert = document.getElementById("errorAlert");
        
        errorAlert.style.display = "none";

        if (!newName || newName.trim() === "") {
            errorAlert.textContent = "수정할 이름을 입력해주세요.";
            errorAlert.style.display = "block";
            return;
        }

        try {
            const response = await fetch("/api/v1/users/me", {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ name: newName })
            });

            if (response.ok) {
                alert("이름이 성공적으로 수정되었습니다.");
                location.reload();
            } else {
                const errData = await response.json();
                errorAlert.textContent = errData.message || "이름 수정에 실패했습니다.";
                errorAlert.style.display = "block";
            }
        } catch (error) {
            errorAlert.textContent = "서버 연결에 실패했습니다.";
            errorAlert.style.display = "block";
        }
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "/";
    });
  </script>
</body>
</html>
