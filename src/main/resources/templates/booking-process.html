<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 처리 중 - Ticket Wave</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f7f8fc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #222;
        }
        .container {
            text-align: center;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 480px;
            width: 90%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 {
            font-size: 22px;
            margin-bottom: 12px;
            color: #111827;
        }
        p {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .status-badge {
            display: inline-block;
            background: #eef2ff;
            color: #4f46e5;
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 13px;
        }
        .error-message {
            color: #ef4444;
            background: #fef2f2;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">결제 승인 처리 중</h2>
        <p id="description">
            선택하신 좌석에 대한 최종 예매 확정 처리를 진행하고 있습니다.<br>
            잠시만 대기해 주시면 완료 페이지로 자동 연결됩니다.
        </p>
        <div class="status-badge" id="status">⏳ 예매 접수 대기 중...</div>
        <div class="error-message" id="errorMessage"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const requestId = urlParams.get('requestId');
            const token = localStorage.getItem("accessToken");

            if (!requestId || !token) {
                alert("비정상적인 접근입니다.");
                window.location.href = "/";
                return;
            }

            startPolling(requestId, token);
        });

        let pollTimer = null;

        // 백엔드 status 코드값 → 화면 표기 매핑 (BookingService/BookingResult와 동일 vocabulary)
        //   PROCESSING : 워커가 아직 결과 미기록 (계속 폴링)
        //   CONFIRMED  : 확정 성공
        //   CONFLICT   : 동시성 패배 (이미 다른 사용자가 선점/확정)
        //   FAILED     : 시스템 오류 (좌석/사용자 없음 등)
        const FAIL_REASONS = {
            CONFLICT: '이미 다른 사용자가 예매한 좌석입니다.',
            FAILED: '예매 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.'
        };

        // 워커 지연/장애로 PROCESSING이 끝나지 않을 때를 대비한 폴링 타임아웃 (1초 간격 × 30회 = 30초)
        const MAX_POLLS = 30;

        function startPolling(requestId, token) {
            const statusBadge = document.getElementById('status');
            const errorMessage = document.getElementById('errorMessage');
            const spinner = document.getElementById('spinner');
            const title = document.getElementById('title');

            clearInterval(pollTimer);
            let attempts = 0;

            const showFailure = (reason) => {
                clearInterval(pollTimer);
                spinner.style.display = 'none';
                statusBadge.style.background = '#fef2f2';
                statusBadge.style.color = '#ef4444';
                statusBadge.innerText = '❌ 예매 실패';
                errorMessage.innerText = `사유: ${reason}`;
                errorMessage.style.display = 'block';
                setTimeout(() => { window.location.href = '/'; }, 5000);
            };

            pollTimer = setInterval(async () => {
                attempts++;
                try {
                    const res = await fetch(`/api/v1/bookings/status/${requestId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (!res.ok) {
                        throw new Error(`서버 응답 오류 (${res.status})`);
                    }

                    const data = await res.json();

                    if (data.status === 'CONFIRMED') {
                        clearInterval(pollTimer);
                        statusBadge.style.background = '#ecfdf5';
                        statusBadge.style.color = '#10b981';
                        statusBadge.innerText = '✅ 예매 완료 성공!';
                        title.innerText = '예매 완료 성공!';
                        setTimeout(() => {
                            window.location.href = '/booking/complete';
                        }, 1200);
                    } else if (data.status === 'PROCESSING') {
                        statusBadge.innerText = '⏳ 예매 승인 대기 중...';
                        if (attempts >= MAX_POLLS) {
                            showFailure('처리 시간이 초과되었습니다. 마이페이지에서 예매 내역을 확인해 주세요.');
                        }
                    } else {
                        // CONFLICT / FAILED 등 실패 코드
                        showFailure(FAIL_REASONS[data.status] || '대기열 타임아웃 또는 선점 만료');
                    }
                } catch (error) {
                    console.error(error);
                    statusBadge.innerText = '⚠️ 통신 지연 중...';
                    if (attempts >= MAX_POLLS) {
                        showFailure('서버와 통신이 지연되고 있습니다. 마이페이지에서 예매 내역을 확인해 주세요.');
                    }
                }
            }, 1000);
        }
    </script>
</body>
</html>
