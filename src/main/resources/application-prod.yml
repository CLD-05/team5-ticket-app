# application-prod.yml  (EKS prod 프로파일)
# SPRING_PROFILES_ACTIVE=prod 로 활성화.
#
# ⚠️ dev.yml 과 주입 방식이 다름:
#   prod 는 datasource/redis/sqs/jwt 를 Spring 표준 환경변수(SPRING_DATASOURCE_*,
#   SPRING_DATA_REDIS_*, AWS_SQS_*, JWT_SECRET)로 ESO 주입받음.
#   -> Spring Boot 가 표준 키를 자동 바인딩하므로 이 yml 에서 url/host 등을 명시하지 않음
#      (명시하면 ${ENV} 미해석/중복 바인딩으로 충돌). 환경변수로 안 오는 값만 여기 둔다.
spring:
  datasource:
    # url/username/password 는 SPRING_DATASOURCE_* 환경변수(ESO)로 주입됨 -> 여기 명시 안 함.
    # === HikariCP 커넥션 풀 산정 (prod: RDS db.m6i.large) ===
    # m6i.large max_connections ≈ 1365 (t3.small 150 대비 충분히 큼)
    #   worker KEDA maxReplicaCount(20) × pool(8) = 160 이론 최대
    #   -> RDS Proxy 멀티플렉싱으로 완충, RDS 실제 커넥션은 한계(1365) 내 안전
    #   dev(t3.small)에서 pool 8 로 검증된 값을 prod 에서도 유지 (여유 더 큼)
    # ⚠️ Proxy 담당과 정합성 확인: 앱 이론최대(160) vs Proxy->RDS 상한 vs RDS(1365)
    hikari:
      maximum-pool-size: 8            # Pod당 상한 (스케일 시 ×Pod수 = RDS 부하)
      minimum-idle: 2                 # 유휴 커넥션 최소 (과다 점유 방지)
      connection-timeout: 3000        # 풀 고갈 시 3초 후 실패 (무한대기 금지 -> 적체 가시화)
      max-lifetime: 1800000           # 30분. RDS wait_timeout 보다 짧게
      idle-timeout: 600000            # 10분
      pool-name: booking-hikari       # 로그/메트릭 식별용
    replica-url: ${SPRING_DATASOURCE_REPLICA_URL:}
  # redis host/port 는 SPRING_DATA_REDIS_* 환경변수로 주입됨 -> 여기 명시 안 함.

  jpa:
    hibernate:
      # ★ 공통 application.yml 의 ddl-auto: update 를 상속하면 prod 스키마가
      #   Hibernate 에 의해 자동 변경될 위험 -> prod 는 validate 로 고정(스키마 불일치 시 기동 실패).
      ddl-auto: validate
    show-sql: false                   # 공통의 show-sql: true 상속 차단 (로그 오염/성능)
    open-in-view: false

  cloud:
    aws:
      sqs:
        enabled: true                 # 큐 URL/ARN 은 AWS_SQS_* 환경변수로 주입
      region:
        static: ap-northeast-2
      # credentials 제거 -> IRSA(ServiceAccount role)로 인증

app:
  seat:
    hold-ttl-seconds: 10

# Actuator/Micrometer -> Prometheus 노출 (ServiceMonitor가 scrape)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    tags:
      service: booking                # 공통 label
    distribution:
      # histogram_quantile()용 _bucket 시계열 생성. 안 켜면 p99 가 No data (record/raw 모두 빈 값).
      # ★ prod 에 이 설정이 없어 seat-hold/e2e p99 가 측정 불가였음 -> 추가.
      percentiles-histogram:
        http.server.requests: true    # 좌석 선점 API p99 등
        booking.confirm.e2e: true     # 예매 확정 e2e p99 (워커 메트릭)
      # SLO 경계 버킷 추가 — 임계 부근 정밀도 ↑
      slo:
        http.server.requests: 200ms,500ms,1s,2s
        booking.confirm.e2e: 1s,2s,5s

# 부하테스트(A 방식) 전용: 큐토큰 검증 우회 스위치.
# prod deployment-patch 에서 QUEUE_TOKEN_BYPASS=false 로 명시 주입됨.
queue:
  token:
    bypass: ${QUEUE_TOKEN_BYPASS:false}