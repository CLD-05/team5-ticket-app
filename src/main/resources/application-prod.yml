# application-prod.yml  (EKS prod 프로파일)
# SPRING_PROFILES_ACTIVE=prod 로 활성화.
#
# ⚠️ dev.yml 과 주입 방식이 다름:
#   prod 는 datasource/redis/sqs/jwt 를 Spring 표준 환경변수(SPRING_DATASOURCE_*,
#   SPRING_DATA_REDIS_*, AWS_SQS_*, JWT_SECRET)로 ESO 주입받음.
#   -> Spring Boot 가 표준 키를 자동 바인딩하므로 이 yml 에서 url/host 등을 명시하지 않음
#      (명시하면 ${ENV} 미해석/중복 바인딩으로 충돌). 환경변수로 안 오는 값만 여기 둔다.

# === 톰캣 워커 스레드풀 관측 (부하 진단용) ===
# Micrometer 는 톰캣 스레드 지표(tomcat_threads_busy/config_max)를 톰캣 JMX MBean 에서 읽는데,
# Spring Boot 는 이 MBean 등록을 기본 비활성화한다 -> 켜야 부하 중 스레드 포화(max 도달)를 관측 가능.
# (A 측정: enter p99 지연이 자원 포화가 아닌 스레드 큐잉 대기로 추정됨 -> 이 지표로 확정하기 위함)
server:
  tomcat:
    mbeanregistry:
      enabled: true
    threads:
      # deployment base 의 SERVER_TOMCAT_THREADS_MAX env 와 동일 소스로 바인딩.
      # 명시해두면 tomcat_threads_config_max_threads 지표가 이 값으로 안정적으로 노출됨.
      max: ${SERVER_TOMCAT_THREADS_MAX:400}

spring:
  datasource:
    # url/username/password 는 SPRING_DATASOURCE_* 환경변수(ESO)로 주입됨 -> 여기 명시 안 함.
    # === HikariCP 커넥션 풀 재산정 (실측 기반, 2026-07-06) ===
    # [실측] RDS max_connections = 633 (SHOW VARIABLES, 이전 주석 1365는 추정치였음)
    # [실측] 부하 피크 Max_used_connections = 155 (앱 이론 280 -> Proxy 멀티플렉싱 ~0.55)
    #        -> 부하 시 RDS 사용률 155/633 = 24.5% (RDS 자체는 병목 아님)
    # [산정] 소비자 = ticket-service(HPA max15) + booking-worker(KEDA max20) = 35 pod
    #        pool 12: 앱 이론 35×12=420 -> RDS 실제 ~231 (633의 37%, 안전선 내)
    # [주] pending 적체의 근본 원인은 booking 경로의 매 요청 seat->show DB 조회였음.
    #      -> BookingService 로컬 캐시로 조회 자체를 제거(주 처방). pool 상향은 보조.
    # ⚠️ pool 상향 후 재부하로 Max_used_connections 재실측 필수 (Proxy 비율 변동 확인)
    # ⚠️ 김시현(prod 배포 승인)/RDS Proxy 담당과 정합성 확인 후 머지
    hikari:
      maximum-pool-size: 12           # 8->12. RDS 실측 기반 상향 (보조 처방)
      minimum-idle: 4                 # 2->4. pool 확대에 맞춰 유휴 여유 상향
      connection-timeout: 3000        # 풀 고갈 시 3초 후 실패 (무한대기 금지 -> 적체 가시화)
      max-lifetime: 1800000           # 30분. RDS wait_timeout 보다 짧게
      idle-timeout: 600000            # 10분
      pool-name: booking-hikari       # 로그/메트릭 식별용
    replica-url: ${SPRING_DATASOURCE_REPLICA_URL:}
  # redis host/port 는 SPRING_DATA_REDIS_* 환경변수로 주입됨 -> 여기 명시 안 함.

  jpa:
    hibernate:
      # ★ 공통 application.yml 의 ddl-auto: update 를 상속하면 prod 스키마가
      #   Hibernate 에 의해 자동 변경될 위험 -> prod 는 validate 로 고정(스키마 불일치 시 기동 실패).
      ddl-auto: validate
    show-sql: false                   # 공통의 show-sql: true 상속 차단 (로그 오염/성능)
    open-in-view: false

  cloud:
    aws:
      sqs:
        enabled: true                 # 큐 URL/ARN 은 AWS_SQS_* 환경변수로 주입
      region:
        static: ap-northeast-2
      # credentials 제거 -> IRSA(ServiceAccount role)로 인증

app:
  seat:
    # hold-ttl 10 → 300초 (2026-07-06). 서비스 좌석 선점 정책은 5분(300s)인데
    # prod 설정이 10초로 어긋나 있었음(정책-구현 불일치 버그). 부하 시 enter/hold가
    # CPU throttle로 느려져(enter p95 30s) booking 도달 전 10초 만료 → booking_conflict
    # 폭증(booked=0). 서비스 정책값(300s)으로 정정 → 코드 기본값과도 일치.
    hold-ttl-seconds: 300

# Actuator/Micrometer -> Prometheus 노출 (ServiceMonitor가 scrape)
management:
  # === Spring Security observation 계측 비활성화 (2026-07-06, CPU 병목) ===
  # 50k 부하 CPU 프로파일에서 http-nio 스레드 220+개가 ObservationFilterChainDecorator에 몰림.
  # Security 필터 체인이 매 요청·매 필터마다 Observation을 생성/기록 → 2코어 풀포화의 주범.
  # enter는 순수 Redis(경량)인데 이 계측 오버헤드가 CPU를 다 태워 p95 60s 유발.
  # spring.security observation만 off (다른 http.server.requests 메트릭은 유지).
  observations:
    enable:
      spring.security: false
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    tags:
      service: booking                # 공통 label
    distribution:
      # histogram_quantile()용 _bucket 시계열 생성. 안 켜면 p99 가 No data (record/raw 모두 빈 값).
      # ★ prod 에 이 설정이 없어 seat-hold/e2e p99 가 측정 불가였음 -> 추가.
      percentiles-histogram:
        http.server.requests: true    # 좌석 선점 API p99 등
        booking.confirm.e2e: true     # 예매 확정 e2e p99 (워커 메트릭)
      # SLO 경계 버킷 추가 — 임계 부근 정밀도 ↑
      slo:
        http.server.requests: 200ms,500ms,1s,2s
        booking.confirm.e2e: 1s,2s,5s

# 부하테스트(A 방식) 전용: 큐토큰 검증 우회 스위치.
# prod deployment-patch 에서 QUEUE_TOKEN_BYPASS=false 로 명시 주입됨.
queue:
  token:
    bypass: ${QUEUE_TOKEN_BYPASS:false}