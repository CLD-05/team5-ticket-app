      #   run: |
      #     aws eks update-kubeconfig \
      #       --region "${AWS_REGION}" \
      #       --name team5-dev-eks

      # - name: Wait for ArgoCD rollout
      #   run: |
      #     kubectl -n ticketing rollout status deploy/ticket-service --timeout=180s

      # - name: Check ticket-service pods
