name: CI/CD - Deploy Dev

on:
  # PR에서는 빌드/테스트까지만 확인합니다.
  pull_request:
    branches:
      - develop

  # develop에 merge/push되면 CI 성공 후 ECR push와 config repo tag 업데이트를 진행합니다.
  push:
    branches:
      - develop

  # 필요할 때 GitHub Actions 화면에서 수동 실행할 수 있습니다.
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: team5-dev-app
  CONFIG_REPOSITORY: CLD-05/team5-ticket-config
  CONFIG_BRANCH: develop
  CONFIG_KUSTOMIZATION_PATH: apps/ticket-app/overlays/dev/kustomization.yaml

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # PR 단계에서 Dockerfile lint 검증
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # 1. app repo에서 build/test
      - name: Run tests
        run: mvn -B test

      - name: Build jar
        run: mvn -B package -DskipTests

  deploy-dev:
    name: Build Image, Push ECR, Update Config
    runs-on: ubuntu-latest
    needs: ci

    # PR에서는 배포하지 않고, develop push 또는 수동 실행에서만 CD를 수행합니다.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="dev-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      # 3. AWS OIDC로 인증
      # GitHub repository secret에 AWS_ROLE_TO_ASSUME를 등록해야 합니다.
      # 예: arn:aws:iam::194722398200:role/team5-github-actions-deploy
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # 4. ECR login
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 2. Docker image build
      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          docker build \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:dev-latest" \
            .

      # 5. ECR push
      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:dev-latest"

      # 6. config repo checkout
      # 다른 repository에 commit/push해야 하므로 CONFIG_REPO_TOKEN이 필요합니다.
      # classic PAT 또는 fine-grained token에 team5-ticket-config contents write 권한을 부여합니다.
      - name: Checkout config repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPOSITORY }}
          ref: ${{ env.CONFIG_BRANCH }}
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config-repo

      # 7. kustomization.yaml의 image tag 수정
      - name: Update image tag in config repository
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd config-repo

          python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["CONFIG_KUSTOMIZATION_PATH"])
          image_name = f"{os.environ['ECR_REGISTRY']}/{os.environ['ECR_REPOSITORY']}"
          image_tag = os.environ["IMAGE_TAG"]

          text = path.read_text()
          lines = text.splitlines()
          output = []
          in_ticket_image = False

          for line in lines:
              stripped = line.strip()
              if stripped == "- name: ticket-service":
                  in_ticket_image = True
                  output.append(line)
                  continue

              if in_ticket_image and stripped.startswith("newName:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  output.append(f"{indent}newName: {image_name}")
                  continue

              if in_ticket_image and stripped.startswith("newTag:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  output.append(f"{indent}newTag: {image_tag}")
                  in_ticket_image = False
                  continue

              output.append(line)

          path.write_text("\n".join(output) + "\n")
          PY

          git diff -- "${CONFIG_KUSTOMIZATION_PATH}"

      # 8. config repo에 commit & push
      - name: Commit and push config update
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          cd config-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${CONFIG_KUSTOMIZATION_PATH}"; then
            echo "No config image tag changes to commit."
            exit 0
          fi

          git add "${CONFIG_KUSTOMIZATION_PATH}"
          git commit -m "chore: update dev ticket-service image tag to ${IMAGE_TAG}"
          git push origin "${CONFIG_BRANCH}"

      # ---------------------------------------------------------------------
      # 아래 단계들은 현재 클러스터 애드온 준비 상태에 따라 바로 사용할 수 없어 주석으로 남깁니다.
      # External Secrets ClusterSecretStore, AWS Load Balancer Controller,
      # KEDA scale target이 정리된 뒤 활성화하는 것이 안전합니다.
      # ---------------------------------------------------------------------

