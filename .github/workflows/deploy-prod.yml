name: CI/CD - Deploy Prod

on:
  # 수동 승격 시 dev ECR에 이미 존재하는 image tag를 직접 지정
  workflow_dispatch:
    inputs:
      dev_image_tag:
        description: "Promote할 dev image tag 예: dev-abc123"
        required: true
        type: string
      prod_image_tag:
        description: "Prod image tag. 비우면 dev tag 기준으로 prod-* 자동 생성"
        required: false
        type: string

  # main merge 기준 prod promotion workflow 자동 실행
  # 같은 commit으로 dev workflow가 만든 dev-${SHA} 이미지를 prod ECR로 승격
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - ".gitignore"
      - ".gitattributes"

env:
  AWS_REGION: ap-northeast-2
  DEV_ECR_REPOSITORY: team5-dev-app
  PROD_ECR_REPOSITORY: team5-prod-app
  CONFIG_REPOSITORY: CLD-05/team5-ticket-config
  CONFIG_BRANCH: main
  # prod GitOps 매니페스트 image tag 갱신 대상
  CONFIG_KUSTOMIZATION_PATH: apps/ticket-app/overlays/prod/kustomization.yaml

jobs:
  promote-prod:
    name: Promote Dev Image to Prod ECR, Update Config
    runs-on: ubuntu-latest
    # GitHub Environment prod 승인 게이트
    environment: prod

    permissions:
      contents: read
      # AWS Access Key 대신 OIDC Role assume
      id-token: write

    steps:
      - name: Set promotion image tags
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEV_IMAGE_TAG="${{ inputs.dev_image_tag }}"
            PROD_IMAGE_TAG="${{ inputs.prod_image_tag }}"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            DEV_IMAGE_TAG="dev-${SHORT_SHA}"
            PROD_IMAGE_TAG=""
          fi

          if [ -z "${DEV_IMAGE_TAG}" ]; then
            echo "dev_image_tag is required."
            exit 1
          fi

          if [[ "${DEV_IMAGE_TAG}" != dev-* ]]; then
            echo "dev_image_tag must start with dev-. Current value: ${DEV_IMAGE_TAG}"
            exit 1
          fi

          if [ -z "${PROD_IMAGE_TAG}" ]; then
            PROD_IMAGE_TAG="${DEV_IMAGE_TAG/dev-/prod-}"
          fi

          if [[ "${PROD_IMAGE_TAG}" != prod-* ]]; then
            echo "prod_image_tag must start with prod-. Current value: ${PROD_IMAGE_TAG}"
            exit 1
          fi

          echo "dev_image_tag=${DEV_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "prod_image_tag=${PROD_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      # GitHub Environment prod에 AWS_PROD_ROLE_TO_ASSUME secret 등록 필요
      # 예: arn:aws:iam::194722398200:role/team5-gha-prod-role
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # prod에서는 Docker build를 다시 하지 않음
      # dev ECR 이미지를 pull/tag/push하여 layer까지 prod ECR로 승격
      - name: Promote dev image to prod ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          DEV_IMAGE_TAG: ${{ steps.vars.outputs.dev_image_tag }}
          PROD_IMAGE_TAG: ${{ steps.vars.outputs.prod_image_tag }}
        run: |
          set -euo pipefail

          DEV_IMAGE="${ECR_REGISTRY}/${DEV_ECR_REPOSITORY}:${DEV_IMAGE_TAG}"
          PROD_IMAGE="${ECR_REGISTRY}/${PROD_ECR_REPOSITORY}:${PROD_IMAGE_TAG}"

          echo "Promote ${DEV_IMAGE} -> ${PROD_IMAGE}"

          # push 이벤트에서는 dev workflow의 ECR push가 조금 늦게 끝날 수 있어 재시도
          for attempt in $(seq 1 30); do
            if aws ecr describe-images \
              --repository-name "${DEV_ECR_REPOSITORY}" \
              --image-ids imageTag="${DEV_IMAGE_TAG}" \
              --query 'imageDetails[0].imageDigest' \
              --output text > dev-image-digest.txt 2>/dev/null; then
              break
            fi

            echo "Dev image not found yet. attempt=${attempt}/30"
            sleep 10
          done

          DEV_IMAGE_DIGEST="$(cat dev-image-digest.txt)"
          if [ -z "${DEV_IMAGE_DIGEST}" ] || [ "${DEV_IMAGE_DIGEST}" = "None" ]; then
            echo "Dev image does not exist: ${DEV_ECR_REPOSITORY}:${DEV_IMAGE_TAG}"
            exit 1
          fi

          echo "Dev image digest: ${DEV_IMAGE_DIGEST}"

          if PROD_IMAGE_DIGEST="$(aws ecr describe-images \
            --repository-name "${PROD_ECR_REPOSITORY}" \
            --image-ids imageTag="${PROD_IMAGE_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text 2>/dev/null)"; then
            if [ "${PROD_IMAGE_DIGEST}" = "${DEV_IMAGE_DIGEST}" ]; then
              echo "Prod image already exists with the same digest. Skip push."
              exit 0
            fi

            echo "Prod image tag already exists with a different digest."
            echo "prod tag: ${PROD_IMAGE_TAG}"
            echo "current prod digest: ${PROD_IMAGE_DIGEST}"
            echo "dev digest: ${DEV_IMAGE_DIGEST}"
            exit 1
          fi

          docker pull "${DEV_IMAGE}"
          docker tag "${DEV_IMAGE}" "${PROD_IMAGE}"
          docker push "${PROD_IMAGE}"

      - name: Checkout config repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPOSITORY }}
          ref: ${{ env.CONFIG_BRANCH }}
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config-repo

      # Kubernetes 직접 배포 없음
      # config repo image tag만 변경하고 실제 배포는 ArgoCD가 GitOps 방식으로 수행
      - name: Update image tag in config repository
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.prod_image_tag }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd config-repo

          # prod 매니페스트 미생성 시 명확한 실패 처리
          if [ ! -f "${CONFIG_KUSTOMIZATION_PATH}" ]; then
            echo "Config file not found: ${CONFIG_KUSTOMIZATION_PATH}"
            echo "Create the prod ticket-service manifests before running prod deployment."
            exit 1
          fi

          # kustomization.yaml의 ticket-service image newName/newTag만 갱신
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["CONFIG_KUSTOMIZATION_PATH"])
          image_name = f"{os.environ['ECR_REGISTRY']}/{os.environ['PROD_ECR_REPOSITORY']}"
          image_tag = os.environ["IMAGE_TAG"]

          lines = path.read_text().splitlines()
          output = []
          in_ticket_image = False
          updated_name = False
          updated_tag = False

          for line in lines:
              stripped = line.strip()
              if stripped == "- name: ticket-service":
                  in_ticket_image = True
                  output.append(line)
                  continue

              if in_ticket_image and stripped.startswith("newName:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  output.append(f"{indent}newName: {image_name}")
                  updated_name = True
                  continue

              if in_ticket_image and stripped.startswith("newTag:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  output.append(f"{indent}newTag: {image_tag}")
                  in_ticket_image = False
                  updated_tag = True
                  continue

              output.append(line)

          if not updated_name or not updated_tag:
              raise SystemExit("ticket-service image entry was not found in kustomization.yaml")

          path.write_text("\n".join(output) + "\n")
          PY

          git diff -- "${CONFIG_KUSTOMIZATION_PATH}"

      # config repo 변경 발생 시 prod 승격용 브랜치에 commit/push
      # 대상 브랜치(main)에 직접 push하지 않고 PR 승인 후 ArgoCD가 반영
      - name: Commit and push promotion branch
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.prod_image_tag }}
        run: |
          cd config-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          PROMOTION_BRANCH="promote/prod-ticket-service-${IMAGE_TAG}-${GITHUB_RUN_NUMBER}"

          if git diff --quiet -- "${CONFIG_KUSTOMIZATION_PATH}"; then
            echo "No config image tag changes to commit."
            exit 0
          fi

          git checkout -b "${PROMOTION_BRANCH}"
          git add "${CONFIG_KUSTOMIZATION_PATH}"
          git commit -m "chore: update prod ticket-service image tag to ${IMAGE_TAG}"
          git push origin "${PROMOTION_BRANCH}"

          echo "promotion_branch=${PROMOTION_BRANCH}" >> "$GITHUB_ENV"

      # prod 반영은 config repo PR 승인/merge 이후 ArgoCD가 수행
      - name: Create config promotion pull request
        env:
          GH_TOKEN: ${{ secrets.CONFIG_REPO_TOKEN }}
          DEV_IMAGE_TAG: ${{ steps.vars.outputs.dev_image_tag }}
          PROD_IMAGE_TAG: ${{ steps.vars.outputs.prod_image_tag }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          if [ -z "${promotion_branch:-}" ]; then
            echo "No promotion branch was created. Skip PR creation."
            exit 0
          fi

          gh pr create \
            --repo "${CONFIG_REPOSITORY}" \
            --base "${CONFIG_BRANCH}" \
            --head "${promotion_branch}" \
            --title "chore: promote prod ticket-service ${PROD_IMAGE_TAG}" \
            --body "$(cat <<BODY
          ## 작업 내용

          dev에서 검증된 ticket-service 이미지를 prod ECR로 승격하고, prod GitOps image tag를 갱신하는 PR.

          - Source image: \`${ECR_REGISTRY}/${DEV_ECR_REPOSITORY}:${DEV_IMAGE_TAG}\`
          - Promoted image: \`${ECR_REGISTRY}/${PROD_ECR_REPOSITORY}:${PROD_IMAGE_TAG}\`
          - Config path: \`${CONFIG_KUSTOMIZATION_PATH}\`
          - Base branch: \`${CONFIG_BRANCH}\`

          ## 배포 흐름

          이 PR이 merge되면 ArgoCD가 config repo 변경을 감지하여 prod Deployment에 반영.

          \`\`\`text
          dev workflow
          -> dev ECR image build/push
          -> prod workflow
          -> dev image를 prod ECR로 promotion
          -> config repo promotion PR 생성
          -> PR 승인/merge
          -> ArgoCD Auto Sync
          -> prod rollout
          \`\`\`
          BODY
          )"
